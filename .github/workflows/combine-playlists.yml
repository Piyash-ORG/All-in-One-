name: Combine M3U Playlists

on:
  push:
    branches:
      - main
    paths:
      # নির্দিষ্ট ফোল্ডারের ভেতরের সব .m3u ফাইল ট্র্যাক করবে
      - 'channels/**.m3u'
      - 'series/**.m3u'
      - 'movies/**.m3u'
      - 'islamic/**.m3u'
      - 'songs/**.m3u'

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Combine M3U files
        run: |
          # শুরুতে নতুন index.m3u ফাইল তৈরি এবং হেডার যোগ করা
          echo '#EXTM3U x-tvg-url="YOUR_EPG_URL_HERE.xml"' > index.m3u
          
          # ক্যাটাগরি ফোল্ডারগুলোর লিস্ট
          folders=("channels" "series" "movies" "islamic" "songs")

          for folder in "${folders[@]}"; do
            if [ -d "$folder" ]; then
              echo "Processing $folder folder..."
              # -h ফ্ল্যাগটি ফাইলের নাম লুকানোর জন্য কাজ করবে, শুধু আসল ডেটা কমিট হবে
              find "$folder" -name "*.m3u" -exec grep -h -v "#EXTM3U" {} + >> index.m3u
            fi
          done
          
          echo "✅ Playlists combined successfully without file names."

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update index.m3u playlist (fixed file names)"
          file_pattern: index.m3u
          commit_options: '--no-verify'
