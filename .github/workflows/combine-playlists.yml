name: Combine M3U Playlists

on:
  push:
    branches:
      - main
    paths:
      # Track all .m3u files inside specific folders
      - 'channels/**.m3u'
      - 'series/**.m3u'
      - 'movies/**.m3u'
      - 'islamic/**.m3u'
      - 'songs/**.m3u'

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Combine M3U files
        run: |
          # Create a fresh index.m3u file with the EPG header (overwrites if already exists)
          echo '#EXTM3U x-tvg-url="YOUR_EPG_URL_HERE.xml"' > index.m3u
          
          # Define the list of category folders
          folders=("channels" "series" "movies" "islamic" "songs")

          for folder in "${folders[@]}"; do
            # Check if the folder exists before processing
            if [ -d "$folder" ]; then
              echo "Processing directory: $folder..."
              
              # Find all .m3u files and append their contents to index.m3u
              # '-h' hides the filename in the output, '-v' removes the '#EXTM3U' tags from inner files
              find "$folder" -type f -name "*.m3u" -exec grep -h -v "#EXTM3U" {} + >> index.m3u
            else
              echo "Directory $folder not found. Skipping..."
            fi
          done
          
          echo "✅ All M3U playlists have been successfully combined into index.m3u."

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update index.m3u with latest playlist data"
          file_pattern: index.m3u
          commit_options: '--no-verify'
